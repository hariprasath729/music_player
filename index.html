<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Player</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <script>
      /* Frame-busting clickjacking protection */
      if (window.self !== window.top) {
        window.top.location = window.self.location;
      }

      // PWA Auto-Recovery: Disabled during development to prevent infinite reload loops.
      if (location.port !== '5173') {
        window.addEventListener('error', function(e) {
          var target = e.target || e.srcElement;
          var isScriptOrLink = target && (target.tagName === 'SCRIPT' || target.tagName === 'LINK');
          if (isScriptOrLink && navigator.serviceWorker) {
            console.warn('Asset load failed. Attempting PWA auto-recovery...');
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
              for (var i = 0; i < registrations.length; i++) {
                registrations[i].unregister();
              }
              window.location.reload(true);
            });
          }
        }, true);
      }
    </script>
    <style>
 /* Full-screen splash (covers everything immediately) */
      #splash {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        background: #000000;
        z-index: 999999;
        opacity: 1;
        pointer-events: all;
      }
      #splash.fade-out {
        opacity: 0;
        transition: opacity 0.4s ease;
        pointer-events: none;
      }
      #splash svg, #splash img {
        position: absolute;
        inset: 0;
        margin: auto;
        display: block;
        width: clamp(150px, 22vw, 200px);
        height: auto;
      }
      /* SVG Logo Animation Styles */
      #splash svg {
        overflow: visible;
      }
      .splash-circle {
        transform-origin: center;
        transform: scale(0);
        opacity: 0;
        animation: circleReveal 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards;
        filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.4));
      }
      .splash-line {
        fill: none;
        stroke: #ffffff;
        stroke-linecap: round;
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        opacity: 0;
        animation: drawLine 0.35s ease-out forwards;
      }
      #line1 { animation-delay: 0.8s; stroke-width: 5; }
      #line2 { animation-delay: 0.95s; stroke-width: 6.5; }
      #line3 { animation-delay: 1.1s; stroke-width: 8; }
      @keyframes circleReveal {
        0% { transform: scale(0); opacity: 0; }
        70% { transform: scale(1.1); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
      }
      @keyframes drawLine {
        0% { stroke-dashoffset: 100; opacity: 0; }
        20% { opacity: 1; }
        100% { stroke-dashoffset: 0; opacity: 1; }
      }
      /* Static Logo Fade-out */
      #splash img {
        opacity: 1;
        animation: fadeOutLogo 0.3s ease-in-out 0.4s forwards;
      }
      
      @keyframes fadeOutLogo {
        from { opacity: 1; transform: scale(1); }
        to { opacity: 0; transform: scale(0.9); }
      }
    </style>
  </head>
  <body class="bg-[#121212] text-white antialiased">
    <div id="splash" aria-hidden="true">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle class="splash-circle" cx="50" cy="50" r="50" fill="#ff0000" />
        <!-- pathLength="100" simplifies our CSS stroke-dasharray animation! -->
        <path id="line1" class="splash-line" d="M 36 38 Q 50 32 64 38" pathLength="100" />
        <path id="line2" class="splash-line" d="M 28 53 Q 50 45 72 53" pathLength="100" />
        <path id="line3" class="splash-line" d="M 20 68 Q 50 58 80 68" pathLength="100" />
      </svg>
      <img src="/logo_maskable.png" alt="Music Player" />
    </div>
    </style>
  </head>
  <body class="bg-[#121212] text-white antialiased">

    <div id="root"></div>
    <script>
      var splashStartTime = Date.now();

      // Expose a global function so React can hide the splash screen when data is fully ready
      window.hideSplashScreen = function () {
        var splash = document.getElementById('splash');
        if (!splash || splash.style.display === 'none') return;

        // Hide immediately on password-related pages
        var path = window.location.pathname;
        if (path.includes('forgot-password') || path.includes('reset-password') || window.location.search.includes('token=')) {
          splash.classList.add('fade-out');
          splash.style.display = 'none';
          return;
        }

        var elapsed = Date.now() - splashStartTime;
        var MIN_SPLASH_TIME = 1500; // Perfect sync with the final line drawing (1.45s)
        if (elapsed < MIN_SPLASH_TIME) {
          window.setTimeout(window.hideSplashScreen, MIN_SPLASH_TIME - elapsed);
          return;
        }

        splash.classList.add('fade-out');
        // Remove from layout after fade-out completes
        window.setTimeout(function () {
          splash.style.display = 'none';
        }, 400);
      };

      // Splash dismissal is now managed by AppBootstrap in React.
      // No fallback auto-hide timer — AppBootstrap enforces the 2500ms deadline.
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
