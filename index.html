<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Player</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <script>
      // PWA Auto-Recovery: If JS/CSS fails to load (404), unregister the Service Worker and hard reload.
      window.addEventListener('error', function(e) {
        var target = e.target || e.srcElement;
        var isScriptOrLink = target && (target.tagName === 'SCRIPT' || target.tagName === 'LINK');
        if (isScriptOrLink && navigator.serviceWorker) {
          console.warn('Asset load failed. Attempting PWA auto-recovery...');
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for (var i = 0; i < registrations.length; i++) {
              registrations[i].unregister();
            }
            window.location.reload(true);
          });
        }
      }, true);
    </script>
    <style>
      /* Full-screen splash (covers everything immediately) */
      #splash {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        background: #000000;
        z-index: 999999;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 1;
        pointer-events: all;
      }

      #splash.fade-out {
        opacity: 0;
        transition: opacity 0.4s ease;
        pointer-events: none;
      }

      /* Responsive logo sizing */
      #splash img {
        display: block;
        width: clamp(150px, 22vw, 200px);
        height: auto;
      }
    </style>
  </head>
  <body class="bg-[#121212] text-white antialiased">
    <div id="splash" aria-hidden="true">
      <img src="/logo_maskable.png" alt="" />
    </div>
    <div id="root"></div>
    <script>
      // Hide splash AFTER the app finishes loading (smooth fade out)
      window.addEventListener('load', function () {
        var splash = document.getElementById('splash');
        if (!splash) return;
        splash.classList.add('fade-out');

        // Remove from layout after fade-out completes
        window.setTimeout(function () {
          splash.style.display = 'none';
        }, 400);
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
