<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Player</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <script>
      // PWA Auto-Recovery: If JS/CSS fails to load (404), unregister the Service Worker and hard reload.
      window.addEventListener('error', function(e) {
        var target = e.target || e.srcElement;
        var isScriptOrLink = target && (target.tagName === 'SCRIPT' || target.tagName === 'LINK');
        if (isScriptOrLink && navigator.serviceWorker) {
          console.warn('Asset load failed. Attempting PWA auto-recovery...');
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for (var i = 0; i < registrations.length; i++) {
              registrations[i].unregister();
            }
            window.location.reload(true);
          });
        }
      }, true);
    </script>
    <style>
      /* Splash Screen Container */
      #splash-screen {
        position: fixed;
        inset: 0;
        background-color: #0d0d0d;
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        /* Begins fading out cleanly at the 2 second mark */
        animation: hideSplash 0.5s ease 2s forwards;
      }
      .splash-logo {
        width: 140px;
        height: 140px;
        overflow: visible; /* Prevents shadow clipping */
      }
      /* 1. Circle Grow Animation */
      .splash-circle {
        fill: #ff0000;
        transform-origin: center;
        transform: scale(0);
        animation: circleGrow 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }
      /* Base style for all lines */
      .splash-line {
        fill: none;
        stroke: #ffffff;
        stroke-linecap: round;
        stroke-dasharray: 120;
        stroke-dashoffset: 120;
        opacity: 0;
      }
      /* 3. Sequential Curved Lines Reveal */
      .splash-line-top { stroke-width: 5.5; animation: drawLine 0.4s ease-out 0.85s forwards; }
      .splash-line-mid { stroke-width: 6.5; animation: drawLine 0.4s ease-out 1.05s forwards; }
      .splash-line-bot { stroke-width: 8;   animation: drawLine 0.4s ease-out 1.25s forwards; }

      @keyframes circleGrow {
        0%   { transform: scale(0);   filter: drop-shadow(0 0 0px rgba(255,0,0,0)); }
        75%  { transform: scale(1.1); filter: drop-shadow(0 0 25px rgba(255,0,0,0.6)); } /* Overshoot */
        100% { transform: scale(1);   filter: drop-shadow(0 0 15px rgba(255,0,0,0.4)); } /* Subtle glow */
      }
      @keyframes drawLine {
        0%   { stroke-dashoffset: 120; opacity: 0; }
        10%  { opacity: 1; } /* Slight fade-in */
        100% { stroke-dashoffset: 0;   opacity: 1; }
      }
      @keyframes hideSplash {
        0%   { opacity: 1; }
        100% { opacity: 0; pointer-events: none; visibility: hidden; }
      }
    </style>
  </head>
  <body class="bg-[#121212] text-white antialiased">
    <div id="splash-screen">
      <svg class="splash-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle class="splash-circle" cx="50" cy="50" r="48" />
        <!-- Curved sound waves with mathematically precise symmetry -->
        <path class="splash-line splash-line-top" d="M 34 38 Q 50 31 66 38" />
        <path class="splash-line splash-line-mid" d="M 26 54 Q 50 43 74 54" />
        <path class="splash-line splash-line-bot" d="M 18 72 Q 50 58 82 72" />
      </svg>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
